name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: conciergeos/package-lock.json

      - name: Install dependencies
        working-directory: conciergeos
        run: npm ci

      - name: Type check
        working-directory: conciergeos
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: conciergeos/dist/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        run: |
          echo "Deploy preview to Vercel..."
          # npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend to Vercel
        run: |
          echo "Deploy to Vercel production..."
          # npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

      - name: Deploy Backend to Railway
        run: |
          echo "Deploy backend to Railway..."
          # railway up --service backend

      - name: Notify deployment
        run: |
          echo "✅ Deployment complete!"
